# fly.toml app configuration file
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# 初回セットアップ手順:
#   1. fly launch (既存アプリがある場合はスキップ)
#   2. fly postgres create --name fitmentor-db --region nrt
#   3. fly postgres attach fitmentor-db  # DATABASE_URL が自動でシークレットに設定される
#   4. fly secrets set GEMINI_API_KEY=<your-key>
#   5. fly secrets set FRONTEND_ORIGIN=https://<your-app>.vercel.app
#   6. fly deploy

app = 'backend-snowy-cloud-4235'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
