repos:
  - repo: local
    hooks:
      - id: frontend-biome-check
        name: Frontend Biome Check
        entry: bash -c "cd frontend && pnpm check"
        language: system
        types: [file]
        files: ^frontend/
        pass_filenames: false
        
      - id: backend-ty-and-ruff-check
        name: Backend ty And ruff Check
        entry: bash -c "cd backend && uvx ruff check && uvx ty check"
        language: system
        types: [file]
        files: ^backend/
        pass_filenames: false
